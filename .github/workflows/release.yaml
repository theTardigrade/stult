name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Run go vet
        run: go vet ./...

      - name: Build dist binaries
        run: go run ./util/build_helper.go dist

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Extract release notes
        env:
          TAG_NAME: ${{ github.ref_name }}
          RELEASE_NOTES_PATH: ${{ runner.temp }}/release-notes.md
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          tag = os.environ["TAG_NAME"].strip()
          version = tag.removeprefix("v").strip()

          versions_path = Path("docs/versions.md")
          output_path = Path(os.environ["RELEASE_NOTES_PATH"])

          text = versions_path.read_text(encoding="utf-8")

          heading_pattern = re.compile(
              rf"^###\s+v?{re.escape(version)}(?:\s+.*)?$",
              re.MULTILINE,
          )

          match = heading_pattern.search(text)

          if not match:
              raise SystemExit(
                  f"Could not find a release notes section for {tag} in {versions_path}. "
                  f"Expected a heading like '### v{version}'."
              )

          next_heading = re.search(r"^###\s+", text[match.end():], re.MULTILINE)
          end = match.end() + next_heading.start() if next_heading else len(text)

          release_notes = text[match.start():end].strip() + "\n"

          output_path.write_text(release_notes, encoding="utf-8")

          print(f"Extracted release notes for {tag} from {versions_path}")
          print(f"Wrote temporary release notes to {output_path}")
          PY

      - name: Create GitHub Release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ runner.temp }}/release-notes.md
          files: dist/*